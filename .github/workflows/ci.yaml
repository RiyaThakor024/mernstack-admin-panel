name: React CI

on: 
 push:
  branch:
   - main

 pull_request:
  branch:
   - main


jobs: 
 build-and-test: 
   name: Build and Test React App
   runs-on: ubuntu-latest

   steps:
     - name: Checkout repository
     - uses: actions/checkout@v4

     - name: Setup Node.js
       uses: actions/setup-node@v4
       with:
         node-version: 22
         cache: npm

     - name: Install dependencies
       run: npm ci --legacy-peer-deps

     - name: Run eslint
       run: npm run eslint

     - name: Run Test and Covarage
       run: npm test

     - name: Build React App
       run: npm run build
    
